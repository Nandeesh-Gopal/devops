name: Build and Push Jar

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '8'

    - name: Build Project
      run: mvn clean package

    - name: Copy JAR to repo
      run: |
        mkdir -p build
        cp target/*.jar build/

    - name: Commit JAR file
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add build/*.jar
        git commit -m "Auto update jar file" || echo "No changes"
        git push